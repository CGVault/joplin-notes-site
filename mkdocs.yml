site_name: Vault Wiki
theme:
  name: material
  features:
  - navigation.instant
  - navigation.sections
  - navigation.path
  - navigation.top
  - navigation.indexes
  - toc.follow
markdown_extensions:
- tables
- fenced_code
- toc:
    permalink: true
extra_css:
- stylesheets/extra.css
nav:
- Home: index.md
- Sample Page: sample-page.md
